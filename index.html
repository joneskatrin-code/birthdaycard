<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  background:#110B04;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Cormorant Garamond',Georgia,serif;
  gap:0;
}
.hint{
  color:rgba(255,255,255,0.28);
  font-size:10px;
  letter-spacing:0.22em;
  text-transform:uppercase;
  margin-bottom:22px;
  transition:opacity 0.8s ease;
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
}
.scene{
  perspective:2200px;
  width:340px;
  height:435px;
}
.card{
  position:relative;
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transform-origin:0% 50%;
  transition:transform 1.6s cubic-bezier(0.35,0.01,0.2,1);
  cursor:pointer;
}
.card.open{transform:rotateY(-182deg)}
.face{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:2px;
  overflow:hidden;
}
.back{
  transform:rotateY(-180deg);
  background:#F6EDD6;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:44px 36px;
}
canvas{width:100%;height:100%;display:block;object-fit:cover}
.rule{width:44px;height:0.5px;background:#B8481A}
.b-text{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
  font-style:italic;
  font-size:50px;
  line-height:1.08;
  color:#1A0A04;
  text-align:center;
  letter-spacing:-0.01em;
  margin:22px 0;
}
.wave{
  display:flex;
  align-items:center;
  gap:4px;
  margin-top:30px;
  height:22px;
}
.bar{
  width:3px;
  background:#B8481A;
  border-radius:2px;
  height:4px;
  opacity:0.25;
  transition:opacity 0.5s;
}
.wave.on .bar{opacity:1}
.wave.on .bar:nth-child(1){animation:wv 1s ease-in-out infinite}
.wave.on .bar:nth-child(2){animation:wv 1s ease-in-out 0.18s infinite}
.wave.on .bar:nth-child(3){animation:wv 1s ease-in-out 0.34s infinite}
.wave.on .bar:nth-child(4){animation:wv 1s ease-in-out 0.08s infinite}
.wave.on .bar:nth-child(5){animation:wv 1s ease-in-out 0.44s infinite}
@keyframes wv{0%,100%{height:4px}50%{height:19px}}
.tname{
  font-size:9.5px;
  letter-spacing:0.2em;
  color:#B8481A;
  text-transform:uppercase;
  margin-top:7px;
  opacity:0;
  transition:opacity 0.7s ease;
  font-family:'Cormorant Garamond',serif;
  font-weight:300;
}
.tname.on{opacity:1}
  .front {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.front img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

</style>
</head>
<body>

<div class="hint" id="hint">click to open</div>

<div class="scene">
<div class="card" id="card">
 <div class="face front">
  <img src="https://raw.githubusercontent.com/joneskatrin-code/birthdaycard/main/width_880.jpeg" alt="Birthday Card">
</div>
<div class="face back">
    <div class="rule"></div>
    <div class="b-text">Happy<br>Birthday</div>
    <div class="rule"></div>
    <div class="wave" id="wave">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      <div class="bar"></div><div class="bar"></div>
    </div>
    <div class="tname" id="tn">Odetto · Bonheur Sampler</div>
  </div>
</div>
</div>

<audio id="mus" crossorigin="anonymous">
<source src="https://raw.githubusercontent.com/joneskatrin-code/birthdaycard/main/Odetto_-_BONHEUR_SAMPLER_(SkySound.cc).mp3" type="audio/mpeg">
</audio><script>
const card=document.getElementById('card');
const mus=document.getElementById('mus');
const wave=document.getElementById('wave');
const tn=document.getElementById('tn');
const hint=document.getElementById('hint');
let open=false;
card.addEventListener('click',()=>{
  open=!open;
  card.classList.toggle('open',open);
  if(open){
    hint.style.opacity='0';
    mus.play().then(()=>{wave.classList.add('on');tn.classList.add('on');})
    .catch(()=>{tn.textContent='♪ Odetto · Bonheur Sampler';tn.classList.add('on');});
  }else{
    mus.pause();mus.currentTime=0;
    wave.classList.remove('on');tn.classList.remove('on');
  }
});
</script>
</body>
</html>
